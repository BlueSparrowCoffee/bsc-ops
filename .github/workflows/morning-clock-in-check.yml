name: Morning Clock-In Check

# Static Web Apps managed Functions don't support Timer triggers, so this
# workflow fires the HTTP function. The Function self-gates to 6:18–6:25
# Mountain so we don't act on the off-cycle invocation.
#
# 12:20 UTC = 6:20 MDT (March–November)
# 13:20 UTC = 6:20 MST (November–March)
# Both fire daily; the Function ignores whichever one isn't local 6:20.

on:
  schedule:
    - cron: '20 12,13 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass the 6:20 MT time gate (for testing)'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Ping morning-clock-in-check
        run: |
          force_qs=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            force_qs="?force=1"
          fi
          curl --fail-with-body -sS -X POST \
            "${{ secrets.SWA_BASE_URL }}/api/morning-clock-in-check${force_qs}" \
            -H "X-Cron-Key: ${{ secrets.CRON_KEY }}"
